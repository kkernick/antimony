name = "qt6"
description = "Provide necessary files for QT6 applications"
requires = ["wayland", "fonts", "themes", "mime", "dri", "locale", "vaapi"]

[libraries]
directories = [
    "qt6/plugins/wayland-*",
    "qt6/plugins/platform*",
    "qt6/plugins/styles",
    "qt6/plugins/iconengines",
    "qt6/plugins/kiconthemes6",
    "qt6/plugins/imageformats"
]
roots = ["/usr/lib/qt6/plugins"]

[files]
user.ro = [
  "$XDG_CONFIG_HOME/kdedefaults",
  "$XDG_CONFIG_HOME/breezerc",
  "$XDG_CONFIG_HOME/kdeglobals",
  "$XDG_CONFIG_HOME/Trolltech.conf",
  "$XDG_CONFIG_HOME/kde.org"
]
resources.ro = [
  "/usr/share/qt6"
]

[environment]
"QT_QPA_PLATFORM" = "wayland"
