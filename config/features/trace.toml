name = "trace"
description = "Run the application underneath strace"
conditional = "command -v /usr/bin/strace"
binaries = ["strace"]
sandbox_args = ["strace", "-ffyY", "-v", "-s", "256"]

[hooks.parent]
name = "tracer"
type = "Program"
content = "$AT_HOME/utilities/antimony-tracer"
env = true
capture_error = true
