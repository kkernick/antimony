name = "gtk3"
description = "For GTK3 applications"
requires = ["fonts", "dri", "wayland", "accessibility", "gdk-pixbuf", "mime", "themes"]

[environment]
GTK_USE_PORTAL = "1"
GTK_A11Y = "none"

[libraries]
files = ["libgtk-3*", "libgdk-3*"]
directories = ["tinysparql-3.0", "gtk-3.0"]

[ipc]
owns = ["{desktop}"]

[files.user]
ro = ["$HOME/.gtkrc-2.0", "$XDG_CONFIG_HOME/gtk-3.0", "$XDG_CONFIG_HOME/gtk-2.0", "$XDG_CONFIG_HOME/gtkrc-2.0", "$XDG_CONFIG_HOME/gtkrc"]

[files.platform]
ro = ["/etc/xdg/gtk-3.0/"]

[files.resources]
ro = ["/usr/share/glib-2.0", "/usr/share/gtk-3.0", "/usr/share/gtk", "/usr/share/gtk-2.0"]
