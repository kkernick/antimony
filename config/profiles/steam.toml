features = ["vulkan", "bin", "passwd", "ld", "wayland", "network", "pipewire", "xorg", "electron", "tray"]
conflicts = ["hardened_malloc"]
seccomp = "Disabled"
devices = ["/dev"]

[home]
policy = "Enabled"

[ipc]
user_bus = true

[files.platform]
ro = ["/etc/machine-id", "/sys", "/run/udev"]

[libraries]
no_sof = true
roots = ["/usr/lib32"]
