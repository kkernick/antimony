path = "/opt/cryptomator/bin/cryptomator"
notes = "You cannot actually mount volumes though antimony, as that requires privilege."
id = "org.cryptomator.Cryptomator"
features = ["gtk3", "xorg"]
binaries = ["sh"]

[home]
policy = "Enabled"

[ipc]
portals = ["FileChooser"]

[libraries]
files = ["librt*", "libappindicator*", "libX*", "libpthread*", "libgthread*"]
