features = ["gtk3", "python", "gtksourceview", "network"]

[home]
policy = "Enabled"

[ipc]
system_bus = true
owns = ["org.virt-manager.virt-manager"]

[files.platform]
ro = ["/usr/share/misc", "/var/run/libvirt", "/sys", "/usr/share/osinfo", "/usr/share/hwdata"]

[libraries]
files = ["libosinfo*", "libvirt*", "libspice-client*"]
